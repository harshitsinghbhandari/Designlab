<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Design Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');

:root {
–bg: #0b0c0e;
–surface: #13151a;
–border: rgba(255,255,255,0.07);
–accent: #c8f04a;
–accent2: #4af0c8;
–text: #e8e8e0;
–muted: rgba(232,232,224,0.45);
–grid-minor: rgba(200, 240, 74, 0.18);
–grid-major: rgba(200, 240, 74, 0.45);
–grid-center: rgba(74, 240, 200, 0.7);
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
overflow-x: hidden;
}

/* ── Header ── */
header {
width: 100%;
max-width: 900px;
display: flex;
align-items: center;
justify-content: space-between;
padding: 18px 20px 12px;
}

.logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
letter-spacing: 0.12em;
color: var(–accent);
line-height: 1;
}
.logo span { color: var(–accent2); }

.logo-sub {
font-size: 9px;
letter-spacing: 0.22em;
color: var(–muted);
text-transform: uppercase;
margin-top: 2px;
}

.status-pill {
display: flex;
align-items: center;
gap: 7px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px;
padding: 6px 14px;
font-size: 11px;
letter-spacing: 0.1em;
color: var(–muted);
}

.status-dot {
width: 7px; height: 7px;
border-radius: 50%;
background: #444;
transition: background 0.3s;
flex-shrink: 0;
}
.status-dot.live { background: var(–accent); box-shadow: 0 0 6px var(–accent); }
.status-dot.error { background: #f04a4a; }

/* ── Main viewer ── */
.viewer-wrap {
width: 100%;
max-width: 900px;
padding: 0 16px;
position: relative;
}

.viewer-frame {
position: relative;
width: 100%;
border-radius: 4px;
overflow: hidden;
background: #050608;
border: 1px solid var(–border);
box-shadow: 0 0 60px rgba(200,240,74,0.04), 0 20px 60px rgba(0,0,0,0.6);
}

/* Corner brackets */
.viewer-frame::before, .viewer-frame::after {
content: ‘’;
position: absolute;
width: 24px; height: 24px;
z-index: 10;
pointer-events: none;
}
.viewer-frame::before {
top: 8px; left: 8px;
border-top: 2px solid var(–accent);
border-left: 2px solid var(–accent);
}
.viewer-frame::after {
bottom: 8px; right: 8px;
border-bottom: 2px solid var(–accent);
border-right: 2px solid var(–accent);
}

.corner-br, .corner-tl-extra {
position: absolute;
width: 24px; height: 24px;
z-index: 10;
pointer-events: none;
}
.corner-br { top: 8px; right: 8px; border-top: 2px solid var(–accent2); border-right: 2px solid var(–accent2); }
.corner-tl-extra { bottom: 8px; left: 8px; border-bottom: 2px solid var(–accent2); border-left: 2px solid var(–accent2); }

#videoEl {
display: block;
width: 100%;
height: auto;
max-height: 65vh;
object-fit: cover;
}

#gridCanvas {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
pointer-events: none;
}

/* Start screen */
#startScreen {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
background: #050608;
z-index: 20;
}

.camera-icon {
font-size: 52px;
opacity: 0.25;
filter: grayscale(1);
}

.start-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 0.18em;
color: var(–muted);
}

#startBtn {
background: var(–accent);
color: #0b0c0e;
border: none;
border-radius: 3px;
padding: 12px 32px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 18px;
letter-spacing: 0.18em;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
box-shadow: 0 0 0 rgba(200,240,74,0);
}
#startBtn:hover {
transform: scale(1.04);
box-shadow: 0 0 24px rgba(200,240,74,0.3);
}

.permission-hint {
font-size: 10px;
color: var(–muted);
letter-spacing: 0.1em;
text-align: center;
max-width: 260px;
line-height: 1.7;
}

/* ── Controls ── */
.controls {
width: 100%;
max-width: 900px;
padding: 14px 16px 0;
display: flex;
flex-wrap: wrap;
gap: 10px;
align-items: center;
}

.ctrl-group {
display: flex;
align-items: center;
gap: 8px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 3px;
padding: 8px 12px;
flex-shrink: 0;
}

.ctrl-label {
font-size: 9px;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(–muted);
white-space: nowrap;
}

input[type=“range”] {
-webkit-appearance: none;
appearance: none;
height: 2px;
background: rgba(255,255,255,0.1);
border-radius: 1px;
outline: none;
cursor: pointer;
width: 90px;
}
input[type=“range”]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 12px; height: 12px;
border-radius: 50%;
background: var(–accent);
box-shadow: 0 0 6px rgba(200,240,74,0.5);
}

.val-display {
font-size: 11px;
color: var(–accent);
min-width: 28px;
text-align: right;
}

.toggle-btn {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.12em;
background: transparent;
border: 1px solid var(–border);
color: var(–muted);
padding: 5px 10px;
border-radius: 3px;
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
}
.toggle-btn.on {
border-color: var(–accent);
color: var(–accent);
background: rgba(200,240,74,0.07);
}
.toggle-btn:hover { border-color: rgba(200,240,74,0.4); }

/* Color picker for grid */
.color-row { display: flex; gap: 6px; }
.color-dot {
width: 16px; height: 16px;
border-radius: 50%;
cursor: pointer;
border: 2px solid transparent;
transition: transform 0.12s, border-color 0.12s;
flex-shrink: 0;
}
.color-dot:hover { transform: scale(1.2); }
.color-dot.active { border-color: #fff; transform: scale(1.15); }

/* opacity overlay controls */
.opacity-row {
display: flex; align-items: center; gap: 8px;
}

/* Freeze / snapshot */
.action-btns {
display: flex; gap: 8px; margin-left: auto;
}

.act-btn {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 14px;
letter-spacing: 0.14em;
padding: 8px 18px;
border-radius: 3px;
cursor: pointer;
border: 1px solid;
transition: all 0.15s;
}

.act-btn.freeze {
background: transparent;
border-color: var(–accent2);
color: var(–accent2);
}
.act-btn.freeze:hover, .act-btn.freeze.frozen {
background: rgba(74,240,200,0.12);
}
.act-btn.freeze.frozen { color: #f04a4a; border-color: #f04a4a; }

.act-btn.snap {
background: var(–accent);
border-color: var(–accent);
color: #0b0c0e;
}
.act-btn.snap:hover { box-shadow: 0 0 16px rgba(200,240,74,0.3); }

/* grid opacity slider */
.bottom-bar {
width: 100%;
max-width: 900px;
padding: 10px 16px 24px;
display: flex;
flex-wrap: wrap;
gap: 10px;
align-items: center;
}

.hint-bar {
width: 100%;
max-width: 900px;
padding: 0 16px 20px;
display: flex;
gap: 20px;
flex-wrap: wrap;
}

.hint {
font-size: 10px;
letter-spacing: 0.08em;
color: var(–muted);
display: flex;
align-items: center;
gap: 6px;
}
.hint-key {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
padding: 1px 5px;
font-size: 10px;
color: var(–accent);
}

/* Flash effect on snapshot */
.flash {
position: fixed;
inset: 0;
background: white;
pointer-events: none;
opacity: 0;
z-index: 999;
}
.flash.go { animation: flashAnim 0.35s ease-out forwards; }
@keyframes flashAnim {
0% { opacity: 0.85; }
100% { opacity: 0; }
}

/* Saved snapshots strip */
#snapStrip {
width: 100%;
max-width: 900px;
padding: 0 16px 24px;
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.snap-thumb {
width: 80px; height: 50px;
object-fit: cover;
border-radius: 2px;
border: 1px solid var(–border);
cursor: pointer;
transition: border-color 0.15s, transform 0.15s;
}
.snap-thumb:hover { border-color: var(–accent); transform: scale(1.06); }
</style>

</head>
<body>

<div class="flash" id="flash"></div>

<header>
  <div>
    <div class="logo">Design <span>Lab</span></div>
    <div class="logo-sub">Created By Harshit Singh</div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Camera off</span>
  </div>
</header>

<!-- Viewer -->

<div class="viewer-wrap">
  <div class="viewer-frame" id="viewerFrame">
    <div class="corner-br"></div>
    <div class="corner-tl-extra"></div>

<video id="videoEl" autoplay playsinline muted></video>
<canvas id="gridCanvas"></canvas>

<!-- Start screen -->
<div id="startScreen">
  <div class="camera-icon">📷</div>
  <div class="start-title">Point · Grid · Trace</div>
  <button id="startBtn" onclick="startCamera()">Enable Camera</button>
  <div class="permission-hint">Your browser will ask for camera permission.<br>No footage is stored or transmitted.</div>
</div>
```

  </div>
</div>

<!-- Controls row 1 -->

<div class="controls">

  <div class="ctrl-group">
    <span class="ctrl-label">Grid Size</span>
    <input type="range" id="gridSize" min="20" max="120" value="40" step="5" oninput="updateGrid()">
    <span class="val-display" id="gridSizeVal">40</span>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Opacity</span>
    <input type="range" id="gridOpacity" min="5" max="100" value="55" oninput="updateGrid()">
    <span class="val-display" id="gridOpacityVal">55%</span>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Color</span>
    <div class="color-row" id="colorRow">
      <!-- built by JS -->
    </div>
  </div>

  <div class="ctrl-group">
    <button class="toggle-btn on" id="centerToggle" onclick="toggleCenter()">+ Center</button>
    <button class="toggle-btn on" id="diagonalToggle" onclick="toggleDiagonal()">╲ Diagonals</button>
    <button class="toggle-btn on" id="thirdToggle" onclick="toggleThirds()">⅓ Thirds</button>
  </div>

  <div class="action-btns">
    <button class="act-btn freeze" id="freezeBtn" onclick="toggleFreeze()">❚❚ Freeze</button>
    <button class="act-btn snap" onclick="takeSnapshot()">⬤ Snapshot</button>
  </div>

</div>

<!-- Hint bar -->

<div class="hint-bar">
  <div class="hint"><span class="hint-key">Freeze</span> pause to trace precisely</div>
  <div class="hint"><span class="hint-key">Snapshot</span> save with grid baked in</div>
  <div class="hint"><span class="hint-key">Grid Size</span> match your paper squares</div>
</div>

<!-- Snapshot strip -->

<div id="snapStrip"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const COLORS = [
  { name: 'lime',  minor: 'rgba(200,240,74,VAL)',  major: 'rgba(200,240,74,VALX)', center: 'rgba(74,240,200,VALX)' },
  { name: 'cyan',  minor: 'rgba(74,200,240,VAL)',  major: 'rgba(74,200,240,VALX)', center: 'rgba(240,200,74,VALX)' },
  { name: 'white', minor: 'rgba(255,255,255,VAL)',  major: 'rgba(255,255,255,VALX)', center: 'rgba(255,200,74,VALX)' },
  { name: 'red',   minor: 'rgba(240,74,74,VAL)',   major: 'rgba(240,74,74,VALX)',  center: 'rgba(74,240,200,VALX)' },
  { name: 'blue',  minor: 'rgba(74,130,240,VAL)',  major: 'rgba(74,130,240,VALX)', center: 'rgba(240,200,74,VALX)' },
];
const SWATCHES = ['#c8f04a','#4af0c8','#ffffff','#f04a4a','#4a82f0'];

let selectedColor = 0;
let showCenter = true;
let showDiagonals = true;
let showThirds = true;
let frozen = false;
let stream = null;
let animFrame = null;
let frozenImageData = null;

const video = document.getElementById('videoEl');
const canvas = document.getElementById('gridCanvas');
const ctx = canvas.getContext('2d');

// ── Build color swatches ──────────────────────────────────────────────────
const colorRow = document.getElementById('colorRow');
SWATCHES.forEach((c, i) => {
  const d = document.createElement('div');
  d.className = 'color-dot' + (i === 0 ? ' active' : '');
  d.style.background = c;
  d.onclick = () => {
    selectedColor = i;
    document.querySelectorAll('.color-dot').forEach(el => el.classList.remove('active'));
    d.classList.add('active');
    drawGrid();
  };
  colorRow.appendChild(d);
});

// ── Camera ────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      document.getElementById('startScreen').style.display = 'none';
      setStatus('live', 'Live');
      resizeCanvas();
      startGridLoop();
    };
  } catch (err) {
    setStatus('error', 'Permission denied');
    document.getElementById('startScreen').querySelector('.permission-hint').textContent =
      'Camera access was denied. Please allow camera in your browser settings.';
    document.getElementById('startBtn').textContent = 'Retry';
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state ? ` ${state}` : '');
  document.getElementById('statusText').textContent = text;
}

function resizeCanvas() {
  const rect = video.getBoundingClientRect();
  canvas.width = video.videoWidth || rect.width;
  canvas.height = video.videoHeight || rect.height;
}

// ── Grid loop ──────────────────────────────────────────────────────────────
function startGridLoop() {
  function loop() {
    if (!frozen) resizeCanvas();
    drawGrid();
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;

  ctx.clearRect(0, 0, W, H);

  const gridSize = parseInt(document.getElementById('gridSize').value);
  const opPct = parseInt(document.getElementById('gridOpacity').value) / 100;
  const col = COLORS[selectedColor];

  const minorAlpha = opPct * 0.38;
  const majorAlpha = opPct * 0.85;
  const centerAlpha = opPct;

  const minorColor = col.minor.replace('VAL', minorAlpha);
  const majorColor = col.major.replace('VALX', majorAlpha);
  const centerColor = col.center.replace('VALX', centerAlpha);

  const majorEvery = 5; // every 5 minor cells = major line

  // Minor grid lines
  ctx.lineWidth = 0.6;
  ctx.strokeStyle = minorColor;
  ctx.setLineDash([]);
  for (let x = 0; x <= W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Major grid lines (every 5 cells)
  ctx.lineWidth = 1.2;
  ctx.strokeStyle = majorColor;
  const majorStep = gridSize * majorEvery;
  // Offset from center
  const cx = W / 2, cy = H / 2;
  for (let x = cx % majorStep; x <= W; x += majorStep) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = cy % majorStep; y <= H; y += majorStep) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Rule of thirds
  if (showThirds) {
    ctx.strokeStyle = col.minor.replace('VAL', opPct * 0.5);
    ctx.lineWidth = 0.8;
    ctx.setLineDash([6, 5]);
    [W/3, W*2/3].forEach(x => { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); });
    [H/3, H*2/3].forEach(y => { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); });
    ctx.setLineDash([]);
  }

  // Diagonals
  if (showDiagonals) {
    ctx.strokeStyle = col.minor.replace('VAL', opPct * 0.28);
    ctx.lineWidth = 0.7;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(W, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(0, H); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Center crosshair
  if (showCenter) {
    ctx.strokeStyle = centerColor;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
    ctx.setLineDash([]);

    // Center dot
    ctx.fillStyle = centerColor;
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = col.minor.replace('VAL', opPct * 0.6);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI*2);
    ctx.stroke();
  }

  // Coordinate labels on major lines
  if (opPct > 0.3 && gridSize >= 30) {
    ctx.fillStyle = col.minor.replace('VAL', opPct * 0.55);
    ctx.font = `${Math.max(8, gridSize * 0.22)}px "DM Mono", monospace`;
    ctx.textAlign = 'left';
    let xi = 0;
    for (let x = 0; x <= W; x += majorStep) {
      if (xi > 0) ctx.fillText(xi, x + 3, 12);
      xi += majorEvery;
    }
    let yi = 0;
    for (let y = 0; y <= H; y += majorStep) {
      if (yi > 0) ctx.fillText(yi, 3, y - 3);
      yi += majorEvery;
    }
  }
}

// ── Controls ───────────────────────────────────────────────────────────────
function updateGrid() {
  document.getElementById('gridSizeVal').textContent = document.getElementById('gridSize').value;
  document.getElementById('gridOpacityVal').textContent = document.getElementById('gridOpacity').value + '%';
}

function toggleCenter() {
  showCenter = !showCenter;
  document.getElementById('centerToggle').classList.toggle('on', showCenter);
}
function toggleDiagonal() {
  showDiagonals = !showDiagonals;
  document.getElementById('diagonalToggle').classList.toggle('on', showDiagonals);
}
function toggleThirds() {
  showThirds = !showThirds;
  document.getElementById('thirdToggle').classList.toggle('on', showThirds);
}

// ── Freeze ─────────────────────────────────────────────────────────────────
function toggleFreeze() {
  frozen = !frozen;
  const btn = document.getElementById('freezeBtn');
  if (frozen) {
    video.pause();
    btn.textContent = '▶ Unfreeze';
    btn.classList.add('frozen');
    setStatus('', 'Frozen — trace away');
  } else {
    video.play();
    btn.textContent = '❚❚ Freeze';
    btn.classList.remove('frozen');
    setStatus('live', 'Live');
  }
}

// ── Snapshot ───────────────────────────────────────────────────────────────
function takeSnapshot() {
  if (!stream && !frozen) return;

  const snap = document.createElement('canvas');
  snap.width = canvas.width;
  snap.height = canvas.height;
  const sc = snap.getContext('2d');

  // Draw video frame
  sc.drawImage(video, 0, 0, snap.width, snap.height);
  // Draw grid on top
  sc.drawImage(canvas, 0, 0);

  const url = snap.toDataURL('image/jpeg', 0.92);

  // Flash
  const f = document.getElementById('flash');
  f.classList.remove('go');
  void f.offsetWidth;
  f.classList.add('go');

  // Add to strip
  const img = document.createElement('img');
  img.src = url;
  img.className = 'snap-thumb';
  img.title = 'Click to download';
  img.onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = `davinci-eye-${Date.now()}.jpg`;
    a.click();
  };
  document.getElementById('snapStrip').prepend(img);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); toggleFreeze(); }
  if (e.code === 'KeyS' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); takeSnapshot(); }
});
</script>
